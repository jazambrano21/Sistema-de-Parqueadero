version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: parking-postgres
    environment:
      POSTGRES_USER: postgrest
      POSTGRES_PASSWORD: qwerty12
      POSTGRES_DB: parking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - parking-network

  # Kong API Gateway
  kong:
    image: kong/kong-gateway:3.4.0
    container_name: parking-kong
    environment:
      KONG_DATABASE: "off"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
    networks:
      - parking-network
    depends_on:
      - ms-usuarios-roles-oauth
      - ms-zonas-espacios
      - ms-vehiculos
      - ms-tickets

  # Microservicio de Usuarios con OAuth
  ms-usuarios-roles-oauth:
    build:
      context: ./App/ms-usuarios-roles-oauth
      dockerfile: Dockerfile
    container_name: ms-usuarios-roles-oauth
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/usuarios_db
      SPRING_DATASOURCE_USERNAME: postgrest
      SPRING_DATASOURCE_PASSWORD: qwerty12
    networks:
      - parking-network
    depends_on:
      - postgres

  # Microservicio de Zonas y Espacios
  ms-zonas-espacios:
    build:
      context: ./App/ms-zonas-espacios
      dockerfile: Dockerfile
    container_name: ms-zonas-espacios
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zonas_db
      SPRING_DATASOURCE_USERNAME: postgrest
      SPRING_DATASOURCE_PASSWORD: qwerty12
    networks:
      - parking-network
    depends_on:
      - postgres

  # Microservicio de Vehículos
  ms-vehiculos:
    build:
      context: ./App/ms-vehiculos
      dockerfile: Dockerfile
    container_name: ms-vehiculos
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgrest
      DB_PASSWORD: qwerty12
      DB_DATABASE: vehiculos_db
    networks:
      - parking-network
    depends_on:
      - postgres

  # Microservicio de Tickets
  ms-tickets:
    build:
      context: ./App/ms-tickets
      dockerfile: Dockerfile
    container_name: ms-tickets
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgrest
      DB_PASSWORD: qwerty12
      DB_DATABASE: tickets_db
      PERSONAS_URL: http://ms-usuarios-roles-oauth:8082
      VEHICULOS_URL: http://ms-vehiculos:3000
      ESPACIOS_URL: http://ms-zonas-espacios:8081
    networks:
      - parking-network
    depends_on:
      - postgres
      - ms-usuarios-roles-oauth
      - ms-vehiculos
      - ms-zonas-espacios

networks:
  parking-network:
    driver: bridge

volumes:
  postgres-data:
